<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EDOL Demo</title>
    <style>
        body { margin: 0; font-family: Arial; background: #f0f0f0; }
        #container { width: 100%; height: 100vh; }
        #chatBox { position: absolute; bottom: 0; width: 100%; max-height: 200px; overflow-y: auto; background: #fff; }
        input { width: 80%; }
        button { width: 18%; }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="chatBox">
        <input type="text" id="userInput" placeholder="Praat met je EDOL">
        <button onclick="sendMessage()">Verstuur</button>
        <div id="chatLog"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 3); // camera iets hoger en verder

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('container').appendChild(renderer.domElement);

// Licht
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
directionalLight.position.set(0, 10, 10);
scene.add(directionalLight);

const loader = new THREE.GLTFLoader();
loader.load('https://models.readyplayer.me/691ef9adfadfd987cc43169b.glb', function(gltf) {
    const model = gltf.scene;
    model.scale.set(1,1,1); // schaal eventueel aanpassen
    model.position.set(0, 0, 0);
    scene.add(model);
}, undefined, function(error) {
    console.error(error);
});

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

    function sendMessage() {
        const input = document.getElementById("userInput").value;
        const log = document.getElementById("chatLog");
        log.innerHTML += `<p><b>Jij:</b> ${input}</p>`;

        // Voor MVP: Simpele AI reactie
        const reply = "Hoi! Ik ben je EDOL. Je zei: " + input;
        log.innerHTML += `<p><b>EDOL:</b> ${reply}</p>`;

        // Spreek de tekst uit
        const msg = new SpeechSynthesisUtterance(reply);
        window.speechSynthesis.speak(msg);

        document.getElementById("userInput").value = '';
    }
</script>
</body>
</html>
