<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>EDOL Demo</title>
    <style>
        body { margin:0; font-family: Arial, sans-serif; background: #f0f0f0; }
        #container { width: 100%; height: 100vh; display:block; }
        #chatBox {
            position: absolute;
            bottom: 0;
            width: 100%;
            max-height: 200px;
            background: #fff;
            padding: 10px;
            box-sizing: border-box;
        }
        #chatLog { max-height: 120px; overflow-y: auto; margin-bottom:5px; }
        input { width: 75%; padding:5px; }
        button { width: 22%; padding:5px; }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="chatBox">
        <div id="chatLog"></div>
        <input type="text" id="userInput" placeholder="Praat met je EDOL">
        <button onclick="sendMessage()">Verstuur</button>
    </div>

    <!-- Three.js en GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // Scene, camera, renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 3);

        const renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        // Licht
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(0, 10, 10);
        scene.add(directionalLight);

        // Load GLB
        const loader = new THREE.GLTFLoader();
        loader.load('edol.glb', function(gltf) {
            const model = gltf.scene;
            model.scale.set(1,1,1);
            model.position.set(0, 0, 0);
            scene.add(model);
        }, undefined, function(error) {
            console.error("Fout bij laden GLB:", error);
        });

        // Animate
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Chatbox + TTS
        function sendMessage() {
            const inputEl = document.getElementById("userInput");
            const logEl = document.getElementById("chatLog");
            const userText = inputEl.value.trim();
            if(userText === "") return;

            logEl.innerHTML += `<p><b>Jij:</b> ${userText}</p>`;
            logEl.scrollTop = logEl.scrollHeight;

            const reply = "Hoi! Ik ben je EDOL. Je zei: " + userText;
            logEl.innerHTML += `<p><b>EDOL:</b> ${reply}</p>`;
            logEl.scrollTop = logEl.scrollHeight;

            const msg = new SpeechSynthesisUtterance(reply);
            window.speechSynthesis.speak(msg);

            inputEl.value = '';
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
